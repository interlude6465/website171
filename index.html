<script>
// ===== EARLY BAN CHECK & FINGERPRINTING =====
(function() {
  function getCookie(name) {
    var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? decodeURIComponent(match[2]) : null;
  }
  function setCookie(name, value, days) {
    var expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + expires + '; path=/; SameSite=Lax';
  }

  function showBannedOverlay() {
    var style = document.createElement('style');
    style.innerHTML = '#banned-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #333; z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-align: center; padding: 20px; } #banned-overlay h1 { font-size: 32px; margin-bottom: 10px; font-weight: 700; } #banned-overlay p { opacity: 0.8; font-size: 18px; max-width: 400px; line-height: 1.5; }';
    document.documentElement.appendChild(style);
    
    var overlay = document.createElement('div');
    overlay.id = 'banned-overlay';
    overlay.innerHTML = '<div><h1>Access Denied</h1><p>Your access to this system has been suspended.</p></div>';
    document.documentElement.appendChild(overlay);
    window.stop();
  }

  function getCanvasHash() {
    try {
      var canvas = document.createElement('canvas');
      var ctx = canvas.getContext('2d');
      ctx.textBaseline = "top";
      ctx.font = "14px Arial";
      ctx.fillText("LicenceMock", 2, 2);
      return canvas.toDataURL().substring(0, 500);
    } catch(e) { return ""; }
  }

  function generateStableDeviceId() {
    try {
      var fp = {
        ua: navigator.userAgent,
        sr: screen.width + 'x' + screen.height,
        cd: screen.colorDepth,
        tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
        lg: navigator.language,
        pl: navigator.platform,
        hc: navigator.hardwareConcurrency || 0,
        cv: getCanvasHash()
      };
      var str = JSON.stringify(fp);
      var hash = 0;
      for (var i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash = hash & hash;
      }
      return 'dev-' + Math.abs(hash).toString(36).substring(0, 16);
    } catch(e) { return 'dev-fallback-' + Date.now(); }
  }

  var deviceId = getCookie('deviceId') || localStorage.getItem('deviceId') || generateStableDeviceId();
  setCookie('deviceId', deviceId, 365);
  localStorage.setItem('deviceId', deviceId);
  window.__EARLY_DEVICE_ID = deviceId;

  if (getCookie('banned') === '1') {
    window.onload = showBannedOverlay;
  }

  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/log.php?action=checkBan&deviceId=' + encodeURIComponent(deviceId) + '&t=' + Date.now(), false);
    xhr.send();
    if (xhr.status === 403 || xhr.responseText.indexOf('BANNED') !== -1) {
      window.onload = showBannedOverlay;
    }
  } catch(e) {}
})();
</script>

<script>
const APP_VERSION = "v5.2";
const deviceId = window.__EARLY_DEVICE_ID;

function computeFingerprint() {
  return {
    screen: screen.width + 'x' + screen.height,
    cd: screen.colorDepth,
    tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
    lg: navigator.language,
    pl: navigator.platform,
    hc: navigator.hardwareConcurrency || 0
  };
}

async function logAccess(event, success = false, pinAttempt = null, extra = {}) {
  try {
    const res = await fetch('/log.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ deviceId, event, success, pin_attempt: pinAttempt, ...computeFingerprint(), ...extra }),
      keepalive: true
    });
    if (res.status === 403) location.reload();
  } catch(e) {}
}

// PIN
(function(){
  let PIN = "4575";
  fetch('/log.php?action=getLicencePin').then(r => r.json()).then(d => { if(d.pin) PIN = d.pin; });
  const dots = document.querySelectorAll(".pin-dot-fs");
  let buffer = [];
  document.querySelectorAll(".key-btn-fs[data-key]").forEach(btn => {
    btn.onclick = () => {
      if(buffer.length < 4) {
        buffer.push(btn.dataset.key); dots[buffer.length-1].classList.add("filled");
        if(buffer.length === 4) setTimeout(async () => {
          if(buffer.join("") === PIN) {
            await logAccess('pin_success', true);
            document.getElementById("pinOverlayFS").style.display = "none";
            document.getElementById("viewport").style.display = "block";
            document.getElementById("topNav").style.display = "flex";
            loadData();
          } else {
            await logAccess('pin_failed', false, buffer.join(""));
            buffer = []; dots.forEach(d => d.classList.remove("filled"));
          }
        }, 100);
      }
    };
  });
  document.getElementById("pinBackFS").onclick = () => { if(buffer.length > 0) { dots[buffer.length-1].classList.remove("filled"); buffer.pop(); } };
})();

// Tabs
const tabs = document.querySelectorAll(".tab");
const hl = document.querySelector(".tab-highlight");
tabs.forEach((tab, i) => {
  tab.onclick = () => {
    tabs.forEach(t => t.classList.remove("active")); tab.classList.add("active");
    hl.style.width = tab.offsetWidth + "px"; hl.style.transform = `translateX(${tab.offsetLeft}px)`;
    document.querySelectorAll(".details").forEach(d => d.classList.remove("active"));
    document.getElementById(tab.dataset.tab).classList.add("active");
  };
});

// Signature
const sigPopup = document.getElementById("sigPopup");
const sigCtx = sigPopup.getContext("2d");
let drawing = false;
function resize() {
  const r = sigPopup.getBoundingClientRect();
  sigPopup.width = r.width; sigPopup.height = r.height;
  sigCtx.lineWidth = 2; sigCtx.lineCap = 'round';
}
document.getElementById("addSigBtn").onclick = () => { document.getElementById("signatureModal").style.display = "flex"; resize(); };
sigPopup.onmousedown = sigPopup.ontouchstart = (e) => {
  drawing = true; const r = sigPopup.getBoundingClientRect();
  const x = (e.clientX || e.touches[0].clientX) - r.left;
  const y = (e.clientY || e.touches[0].clientY) - r.top;
  sigCtx.beginPath(); sigCtx.moveTo(x, y);
};
sigPopup.onmousemove = sigPopup.ontouchmove = (e) => {
  if(!drawing) return; const r = sigPopup.getBoundingClientRect();
  const x = (e.clientX || e.touches[0].clientX) - r.left;
  const y = (e.clientY || e.touches[0].clientY) - r.top;
  sigCtx.lineTo(x, y); sigCtx.stroke(); if(e.touches) e.preventDefault();
};
sigPopup.onmouseup = sigPopup.ontouchend = () => drawing = false;
document.getElementById("doneSigBtn").onclick = () => {
  const data = sigPopup.toDataURL();
  document.querySelectorAll(".sigCanvas").forEach(c => {
    const ctx = c.getContext("2d"); const img = new Image();
    img.onload = () => { c.width = c.offsetWidth; c.height = c.offsetHeight; ctx.drawImage(img, 0, 0, c.width, c.height); };
    img.src = data;
  });
  document.getElementById("signatureModal").style.display = "none"; saveData();
};
document.getElementById("resetSigBtn").onclick = () => sigCtx.clearRect(0,0,sigPopup.width,sigPopup.height);
document.getElementById("cancelSigBtn").onclick = () => document.getElementById("signatureModal").style.display = "none";

// Edit
document.getElementById("editBtn").onclick = () => {
  document.getElementById("editName").value = document.querySelector(".licenceName").innerText;
  document.getElementById("editAddress").value = document.querySelector(".licenceAddress").innerText;
  document.getElementById("editModal").style.display = "flex";
};
document.getElementById("saveEditBtn").onclick = () => {
  document.querySelectorAll(".licenceName").forEach(el => el.innerText = document.getElementById("editName").value);
  document.querySelector(".licenceAddress").innerText = document.getElementById("editAddress").value;
  document.getElementById("editModal").style.display = "none"; saveData();
};
document.getElementById("cancelEditBtn").onclick = () => document.getElementById("editModal").style.display = "none";

// Photo
document.getElementById("addPhotoBtn").onclick = () => {
  document.getElementById("photoInput").onchange = (e) => {
    const r = new FileReader();
    r.onload = () => { document.getElementById("profilePhoto").src = r.result; saveData(); logAccess('photo_updated', true, null, {photo: r.result}); };
    r.readAsDataURL(e.target.files[0]);
  };
  document.getElementById("photoInput").click();
};

function saveData() {
  localStorage.setItem("licenceName", document.querySelector(".licenceName").innerText);
  localStorage.setItem("licenceAddress", document.querySelector(".licenceAddress").innerText);
  localStorage.setItem("profilePhoto", document.getElementById("profilePhoto").src);
  localStorage.setItem("sig", document.querySelector(".sigCanvas").toDataURL());
}
function loadData() {
  if(localStorage.getItem("licenceName")) document.querySelectorAll(".licenceName").forEach(el => el.innerText = localStorage.getItem("licenceName"));
  if(localStorage.getItem("licenceAddress")) document.querySelector(".licenceAddress").innerText = localStorage.getItem("licenceAddress");
  if(localStorage.getItem("profilePhoto")) document.getElementById("profilePhoto").src = localStorage.getItem("profilePhoto");
  if(localStorage.getItem("sig")) {
    const img = new Image(); img.onload = () => {
      document.querySelectorAll(".sigCanvas").forEach(c => { c.width = c.offsetWidth; c.height = c.offsetHeight; c.getContext("2d").drawImage(img, 0, 0, c.width, c.height); });
    };
    img.src = localStorage.getItem("sig");
  }
}
document.getElementById("clearDataBtn").onclick = () => { if(confirm("Clear all data?")) { localStorage.clear(); location.reload(); } };

window.onload = () => {
  const active = document.querySelector(".tab.active");
  hl.style.width = active.offsetWidth + "px"; hl.style.transform = `translateX(${active.offsetLeft}px)`;
};
logAccess('app_loaded');
</script>
